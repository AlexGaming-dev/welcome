<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/icons/favicon.png">
    <title>403 | ACCESS DENIED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { background: #050505; color: #e0e0e0; font-family: 'Rajdhani', sans-serif; }
        .mono { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-8">
    <div class="max-w-3xl mx-auto flex-grow flex flex-col justify-center">
        <div class="border border-yellow-500/30 bg-yellow-500/5 p-6 rounded-lg mb-8 shadow-[0_0_20px_rgba(234,179,8,0.05)]">
            <h1 class="text-6xl font-bold text-yellow-500 mono mb-4 tracking-tighter">ERROR 403</h1>
            <p class="text-2xl uppercase tracking-widest text-white mb-2">Access Denied</p>
            <div class="text-gray-400 mono text-sm space-y-1 border-l-2 border-yellow-500/30 pl-4 py-2">
                <p>> [SECURITY]: Firewall active.</p>
                <p>> [UNAUTHORIZED_ACCESS_TO]: <span id="request-url" class="text-yellow-400 break-all underline italic">loading...</span></p>
                <p>> [STATUS]: Insufficient permissions for this node.</p>
            </div>
        </div>
        <a href="/" class="text-cyan-400 mono text-lg hover:underline hover:text-cyan-300 transition-all"><- Back to Safe Zone</a>
    </div>

    <footer class="mt-auto pt-8 border-t border-white/10 text-xs flex gap-4 text-gray-600 mono">
        <a href="/impressum" class="hover:text-cyan-400 uppercase">Impressum</a>
        <a href="/privacy" class="hover:text-cyan-400 uppercase">Privacy</a>
    </footer>

    <script>document.getElementById('request-url').textContent = window.location.href;</script>
    <script src="/emoji/alex-emoji.js" defer></script>
    <script src="/emoji/brand-emojis.js" defer></script>
</body>
</html>
