<!DOCTYPE html>
<html lang="de" class="bg-gray-950 text-white">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10">
    <h1 class="text-2xl font-bold mb-6">Verifizierungs-Anträge</h1>
    <div id="queue" class="space-y-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyB91kgTv8QyGkCMibaftH3mtLS4NmGbLTI", projectId: "truepage-ah" }));
        
        async function load() {
            const snap = await getDocs(collection(db, "verification_requests"));
            const q = document.getElementById('queue');
            snap.forEach(d => {
                q.innerHTML += `<div class="bg-gray-900 p-4 rounded flex justify-between">
                    <span>@${d.id}</span>
                    <button onclick="approve('${d.id}')" class="bg-blue-600 px-3 py-1 rounded">Haken</button>
                </div>`;
            });
        }
        window.approve = async (s) => { await updateDoc(doc(db, "pages", s), { verified: true }); await deleteDoc(doc(db, "verification_requests", s)); location.reload(); };
        load();
    </script>
</body>
</html>
