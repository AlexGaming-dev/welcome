<!DOCTYPE html>
<html lang="de" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">
    <div id="profile" class="w-full max-w-sm text-center"></div>
    <div id="qr" class="mt-8 bg-white p-2 rounded"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({ apiKey: "AIzaSyB91kgTv8QyGkCMibaftH3mtLS4NmGbLTI", projectId: "truepage-ah" }));
        const id = new URLSearchParams(window.location.search).get('id');

        async function init() {
            const snap = await getDoc(doc(db, "pages", id));
            if(snap.exists()) {
                const d = snap.data();
                document.getElementById('profile').innerHTML = `
                    <h1 class="text-3xl font-bold mb-6">${d.displayName}</h1>
                    <div class="space-y-3">
                        ${(d.links || []).map(l => `<a href="${l.url}" class="block bg-gray-800 p-4 rounded-xl">${l.title}</a>`).join('')}
                    </div>
                `;
                new QRCode(document.getElementById("qr"), window.location.href);
            }
        }
        init();
    </script>
</body>
</html>
