<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-gray-400 h-screen flex items-center justify-center">
    <div class="text-center">
        <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        <p>Weiterleitung...</p>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB91kgTv8QyGkCMibaftH3mtLS4NmGbLTI",
            authDomain: "truepage-ah.firebaseapp.com",
            projectId: "truepage-ah",
            storageBucket: "truepage-ah.firebasestorage.app",
            messagingSenderId: "679330743144",
            appId: "1:679330743144:web:f872ed11f8f935d1f60cdd"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function go() {
            const id = new URLSearchParams(window.location.search).get('id');
            if(!id) { window.location.href="../index.html"; return; }
            const snap = await getDoc(doc(db, "shortlinks", id));
            if(snap.exists()) {
                await setDoc(doc(db, "analytics", id), { clicks: increment(1) }, { merge: true });
                window.location.href = snap.data().targetUrl;
            } else { document.body.innerText = "Fehler: Link existiert nicht."; }
        }
        go();
    </script>
</body>
</html>
