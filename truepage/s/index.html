<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Truepage Redirecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-400 font-sans min-h-screen flex items-center justify-center">

    <div class="text-center space-y-4">
        <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
        <p class="text-sm font-medium tracking-wide">Sichere Weiterleitung über <span class="text-white font-bold">truepa.ge</span>...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, doc, setDoc, increment } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB91kgTv8QyGkCMibaftH3mtLS4NmGbLTI",
            authDomain: "truepage-ah.firebaseapp.com",
            projectId: "truepage-ah",
            storageBucket: "truepage-ah.firebasestorage.app",
            messagingSenderId: "679330743144",
            appId: "1:679330743144:web:f872ed11f8f935d1f60cdd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function handleRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const linkId = urlParams.get('id');
            const targetUrl = urlParams.get('to');

            if (!targetUrl) {
                window.location.href = "../index.html";
                return;
            }

            if (linkId) {
                try {
                    // Analytics: Erstellt oder inkrementiert den Klick-Zähler datenschutzkonform
                    const analyticsRef = doc(db, "analytics", linkId);
                    await setDoc(analyticsRef, {
                        clicks: increment(1),
                        lastClick: new Date()
                    }, { merge: true });
                } catch (e) {
                    console.error("Analytics Error:", e);
                }
            }

            // Sofortiger Redirect
            window.location.href = decodeURIComponent(targetUrl);
        }

        handleRedirect();
    </script>
</body>
</html>
