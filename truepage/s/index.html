<!DOCTYPE html>
<html lang="de" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <title>Profile | Truepage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div id="root" class="w-full max-w-sm text-center">Lade Profil...</div>
    <div id="qr-code" class="mt-10 bg-white p-2 rounded"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({ apiKey: "AIzaSyB91kgTv8QyGkCMibaftH3mtLS4NmGbLTI", projectId: "truepage-ah" }));
        const id = new URLSearchParams(window.location.search).get('id');

        async function init() {
            const snap = await getDoc(doc(db, "pages", id));
            if(!snap.exists()) return;
            const d = snap.data();
            document.getElementById('root').innerHTML = `
                <div class="w-24 h-24 mx-auto bg-gray-800 rounded-full mb-4"></div>
                <h1 class="text-3xl font-black">${d.displayName}</h1>
                <div class="space-y-3 mt-8">
                    ${(d.links || []).map(l => `<a href="${l.url}" class="block bg-gray-900 hover:bg-gray-800 p-4 rounded-xl border border-gray-800 font-bold">${l.title}</a>`).join('')}
                </div>
            `;
            new QRCode(document.getElementById("qr-code"), window.location.href);
        }
        init();
    </script>
</body>
</html>
