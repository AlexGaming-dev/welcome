<!DOCTYPE html>
<html lang="de" class="bg-gray-950 text-white">
<head>
    <meta charset="UTF-8">
    <title>Truepage | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10">
    <div id="app" class="max-w-2xl mx-auto text-center">
        <h1 class="text-4xl font-black mb-8">TRUEPAGE</h1>
        <div id="view">
            <button id="loginBtn" class="bg-blue-600 px-8 py-3 rounded-xl font-bold hover:bg-blue-500">Mit Google anmelden</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const auth = getAuth(initializeApp({ apiKey: "AIzaSyB91kgTv8QyGkCMibaftH3mtLS4NmGbLTI", projectId: "truepage-ah" }));
        const provider = new GoogleAuthProvider();

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('view').innerHTML = `
                    <div class="space-y-4">
                        <p>Eingeloggt als ${user.displayName}</p>
                        <a href="admin.html" class="block bg-gray-800 p-4 rounded-xl">Admin Panel</a>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
