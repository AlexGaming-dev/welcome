<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truepage — Identität & Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .verified-badge { background: linear-gradient(135deg, #2563eb, #3b82f6); box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .view-section { display: none; }
        .view-active { display: block; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen">

    <nav id="mainNav" class="border-b border-gray-900 bg-gray-950/50 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2 text-xl font-bold tracking-wider text-white cursor-pointer" onclick="window.location.href='index.html'">
            <span>truepa<span class="text-blue-500">.ge</span></span>
        </div>
        <div id="navAuthSection"></div>
    </nav>

    <div id="mainContainer">
        <section id="view-landing" class="view-section text-center px-6 py-20 space-y-8">
            <h1 class="text-6xl font-black text-white leading-none">Deine Identität.<br><span class="text-blue-500">Absolut verifiziert.</span></h1>
            <button onclick="loginWithGoogle()" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold px-8 py-4 rounded-xl transition">Jetzt starten</button>
        </section>

        <section id="view-register-slug" class="view-section max-w-md mx-auto py-20 px-6">
            <div class="bg-gray-900/50 border border-gray-900 p-8 rounded-3xl backdrop-blur">
                <h2 class="text-xl font-bold mb-4">Wähle deinen Namen</h2>
                <input type="text" id="pageUrlInput" placeholder="wunschname" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white outline-none mb-4">
                <button onclick="createNewPage()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Seite erstellen</button>
            </div>
        </section>

        <section id="view-editor" class="view-section max-w-7xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
            <main class="lg:col-span-5 space-y-6">
                <div class="bg-gray-900/40 border border-gray-900 p-6 rounded-2xl">
                    <h2 class="font-semibold mb-4 text-white">Profil anpassen</h2>
                    <div class="flex items-center space-x-4 mb-4">
                        <div class="w-16 h-16 rounded-full bg-gray-800 border overflow-hidden cursor-pointer" onclick="document.getElementById('avatarUploader').click()" id="dashAvatar"></div>
                        <input type="file" id="avatarUploader" class="hidden" accept="image/*">
                        <input type="text" id="displayNameInput" placeholder="Dein voller Name" oninput="updatePreview()" class="flex-1 bg-gray-950 border border-gray-800 rounded-xl px-3 py-2 text-white outline-none">
                    </div>
                    <button onclick="saveProfileMeta()" class="w-full bg-gray-800 py-2 rounded-lg text-xs font-bold uppercase">Metadaten speichern</button>
                </div>
                <div class="bg-gray-900/40 border border-gray-900 p-6 rounded-2xl space-y-3">
                    <h2 class="font-semibold text-white">Neuer Link</h2>
                    <input type="text" id="linkTitle" placeholder="Titel" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2 text-white">
                    <input type="url" id="linkUrl" placeholder="URL" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2 text-white">
                    <button onclick="addLink()" class="w-full bg-blue-600 py-2 rounded-xl font-bold">Link hinzufügen</button>
                    <div id="editorLinks" class="space-y-2 mt-4"></div>
                </div>
                <div class="bg-gray-900/40 border border-gray-900 p-6 rounded-2xl">
                    <h2 class="font-semibold text-white mb-2">Verifizierung beantragen</h2>
                    <textarea id="verifyReason" placeholder="Grund..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2 text-xs text-white mb-2"></textarea>
                    <button onclick="applyVerify()" class="w-full bg-indigo-900 text-indigo-300 py-2 rounded-xl text-xs font-bold">Antrag absenden</button>
                </div>
            </main>

            <aside class="lg:col-span-7 flex justify-center">
                <div id="phonePreview" class="w-full max-w-sm bg-gray-900 border-[8px] border-gray-800 rounded-[3rem] aspect-[9/19] p-4 shadow-2xl relative overflow-hidden">
                    <div class="h-full bg-gradient-to-b from-gray-900 to-black p-6 flex flex-col items-center">
                        <div class="relative mt-8 mb-4">
                            <div id="prevAvatar" class="w-24 h-24 rounded-full border-2 border-gray-700 bg-gray-800 overflow-hidden flex items-center justify-center text-2xl font-bold uppercase">?</div>
                            <div id="prevBadge" class="hidden absolute bottom-0 right-0 w-6 h-6 verified-badge rounded-full border-2 border-gray-900 p-1"><svg fill="white" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></div>
                        </div>
                        <h2 id="prevName" class="text-lg font-bold text-white">Name</h2>
                        <p id="prevSlug" class="text-xs text-gray-500 mb-6">@slug</p>
                        <div id="prevLinks" class="w-full space-y-3"></div>
                    </div>
                </div>
            </aside>
        </section>

        <section id="view-public" class="view-section min-h-screen flex items-center justify-center p-6">
            <div id="publicContent" class="w-full max-w-sm flex flex-col items-center text-center">
                </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB91kgTv8QyGkCMibaftH3mtLS4NmGbLTI",
            authDomain: "truepage-ah.firebaseapp.com",
            projectId: "truepage-ah",
            storageBucket: "truepage-ah.firebasestorage.app",
            messagingSenderId: "679330743144",
            appId: "1:679330743144:web:f872ed11f8f935d1f60cdd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null, activeSlug = null, localLinks = [];

        // ROUTER & VIEW LOGIK
        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('view-active'));
            document.getElementById(viewId).classList.add('view-active');
        }

        // PRÜFEN: IST ES EIN PROFIL-AUFRUF?
        const urlParams = new URLSearchParams(window.location.search);
        const userQuery = urlParams.get('u');

        if (userQuery) {
            document.getElementById('mainNav').style.display = 'none';
            loadPublicProfile(userQuery);
        } else {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('navAuthSection').innerHTML = `<span class="text-xs mr-3">${user.displayName}</span><button onclick="auth.signOut()" class="text-xs bg-gray-900 px-3 py-1 rounded-lg">Logout</button>`;
                    const userSnap = await getDoc(doc(db, "users", user.uid));
                    if (userSnap.exists()) { activeSlug = userSnap.data().activeSlug; loadEditorData(); }
                    else { showView('view-register-slug'); }
                } else { showView('view-landing'); }
            });
        }

        window.loginWithGoogle = () => signInWithPopup(auth, provider);

        window.createNewPage = async () => {
            const slug = document.getElementById('pageUrlInput').value.trim().toLowerCase();
            if(!slug) return;
            await setDoc(doc(db, "pages", slug), { ownerUid: currentUser.uid, slug, displayName: currentUser.displayName, verified: false, links: [], avatarData: "" });
            await setDoc(doc(db, "users", currentUser.uid), { activeSlug: slug });
            location.reload();
        };

        async function loadEditorData() {
            const snap = await getDoc(doc(db, "pages", activeSlug));
            const data = snap.data();
            localLinks = data.links || [];
            document.getElementById('displayNameInput').value = data.displayName || "";
            activeSlug = data.slug;
            updatePreview(data);
            renderEditorLinks();
            showView('view-editor');
        }

        window.updatePreview = (data) => {
            const name = document.getElementById('displayNameInput').value || "Name";
            document.getElementById('prevName').innerText = name;
            document.getElementById('prevSlug').innerText = "@" + activeSlug;
            if (data?.avatarData) {
                const img = `<img src="${data.avatarData}" class="w-full h-full object-cover">`;
                document.getElementById('prevAvatar').innerHTML = img;
                document.getElementById('dashAvatar').innerHTML = img;
            }
            if(data?.verified) document.getElementById('prevBadge').classList.remove('hidden');
        };

        // BILD SPEICHERN FIX
        document.getElementById('avatarUploader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const base64 = event.target.result;
                await updateDoc(doc(db, "pages", activeSlug), { avatarData: base64 });
                loadEditorData();
            };
            reader.readAsDataURL(file);
        });

        window.saveProfileMeta = async () => {
            const newName = document.getElementById('displayNameInput').value;
            await updateDoc(doc(db, "pages", activeSlug), { displayName: newName });
            alert("Gespeichert!");
        };

        window.addLink = async () => {
            const title = document.getElementById('linkTitle').value, url = document.getElementById('linkUrl').value;
            if(!title || !url) return;
            const shortId = Math.floor(100000 + Math.random() * 900000).toString();
            localLinks.push({ title, url, shortId });
            await updateDoc(doc(db, "pages", activeSlug), { links: localLinks });
            await setDoc(doc(db, "shortlinks", shortId), { targetUrl: url });
            loadEditorData();
        };

        function renderEditorLinks() {
            const container = document.getElementById('editorLinks'), prevContainer = document.getElementById('prevLinks');
            container.innerHTML = ""; prevContainer.innerHTML = "";
            localLinks.forEach((link, i) => {
                container.innerHTML += `<div class="bg-gray-950 p-2 rounded-lg flex justify-between text-xs"><span>${link.title}</span><button onclick="removeLink(${i})" class="text-red-500">Löschen</button></div>`;
                prevContainer.innerHTML += `<a href="/truepage/s/?id=${link.shortId}" target="_blank" class="w-full bg-gray-800/50 py-3 px-4 rounded-xl text-center text-sm block border border-gray-800">${link.title}</a>`;
            });
        }

        window.removeLink = async (i) => {
            localLinks.splice(i, 1);
            await updateDoc(doc(db, "pages", activeSlug), { links: localLinks });
            loadEditorData();
        };

        window.applyVerify = async () => {
            const reason = document.getElementById('verifyReason').value;
            await setDoc(doc(db, "verification_requests", activeSlug), { slug: activeSlug, applicantUid: currentUser.uid, reason, timestamp: new Date() });
            alert("Beantragt!");
        };

        // ÖFFENTLICHES PROFIL LADEN
        async function loadPublicProfile(slug) {
            const snap = await getDoc(doc(db, "pages", slug));
            if (!snap.exists()) { document.body.innerHTML = "404 - Seite nicht gefunden"; return; }
            const data = snap.data();
            showView('view-public');
            document.getElementById('publicContent').innerHTML = `
                <div class="relative mb-6">
                    <div class="w-28 h-28 rounded-full border-4 border-gray-800 bg-gray-900 overflow-hidden flex items-center justify-center text-3xl font-bold uppercase">
                        ${data.avatarData ? `<img src="${data.avatarData}" class="w-full h-full object-cover">` : data.slug.charAt(0)}
                    </div>
                    ${data.verified ? `<div class="absolute bottom-1 right-1 w-8 h-8 verified-badge rounded-full border-4 border-gray-950 p-1.5"><svg fill="white" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></div>` : ''}
                </div>
                <h1 class="text-2xl font-bold text-white">${data.displayName || data.slug}</h1>
                <p class="text-gray-500 mb-8 tracking-wide">@${data.slug}</p>
                <div class="w-full space-y-4">
                    ${data.links.map(l => `<a href="/truepage/s/?id=${l.shortId}" target="_blank" class="block w-full bg-gray-900 border border-gray-800 py-4 px-6 rounded-2xl text-white font-medium hover:bg-gray-800 transition shadow-lg">${l.title}</a>`).join('')}
                </div>
                <div class="mt-12 opacity-30 text-[10px] uppercase font-bold tracking-widest text-white">Verified Identity by Truepage</div>
            `;
        }
        window.auth = auth;
    </script>
</body>
</html>
