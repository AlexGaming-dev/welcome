<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truepage — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .verified-badge {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        .drag-over { border: 2px dashed #3b82f6 !important; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col">

    <nav class="border-b border-gray-900 bg-gray-950/50 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2 text-xl font-bold tracking-wider text-white cursor-pointer" onclick="showView('view-landing')">
            <span>truepa<span class="text-blue-500">.ge</span></span>
        </div>
        <div id="navAuthSection">
            <button onclick="loginWithGoogle()" class="bg-white text-gray-950 font-semibold px-4 py-2 rounded-xl text-sm hover:bg-gray-200 transition">Mit Google anmelden</button>
        </div>
    </nav>

    <div class="flex-1 flex flex-col">

        <section id="view-landing" class="view-section max-w-4xl mx-auto text-center px-6 py-20 my-auto space-y-8">
            <span class="bg-blue-950/50 text-blue-400 border border-blue-900/60 px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide uppercase">🚀 Next-Gen Link-In-Bio</span>
            <h1 class="text-5xl md:text-6xl font-black text-white tracking-tight leading-none">
                Eine Link-Seite.<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-indigo-400">Absolut verifiziert.</span>
            </h1>
            <div class="pt-4">
                <button onclick="showView('view-auth')" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold px-8 py-4 rounded-xl shadow-lg shadow-blue-950/50 transition">Jetzt starten</button>
            </div>
        </section>

        <section id="view-auth" class="view-section hidden max-w-md w-full mx-auto px-6 py-20 my-auto text-center">
            <div class="bg-gray-900/50 border border-gray-900 p-8 rounded-3xl backdrop-blur">
                <h2 class="text-2xl font-bold text-white mb-2">Willkommen bei Truepage</h2>
                <p class="text-sm text-gray-400 mb-8">Registrierung und Login laufen sicher über Google.</p>
                <button onclick="loginWithGoogle()" class="w-full bg-white text-gray-950 font-bold py-3.5 px-4 rounded-xl transition flex items-center justify-center space-x-3 hover:bg-gray-200">
                    <span>Weiter mit Google</span>
                </button>
            </div>
        </section>

        <section id="view-register-slug" class="view-section hidden max-w-md w-full mx-auto px-6 py-20 my-auto">
            <div class="bg-gray-900/50 border border-gray-900 p-8 rounded-3xl backdrop-blur">
                <h2 class="text-xl font-bold text-white mb-2">Sichere dir deine URL</h2>
                <div class="space-y-4 mt-4">
                    <div class="flex rounded-xl overflow-hidden border border-gray-800 focus-within:border-blue-500 transition">
                        <span class="bg-gray-800 px-4 py-3 text-gray-400 text-sm flex items-center">truepa.ge/</span>
                        <input type="text" id="pageUrlInput" placeholder="wunschname" class="bg-transparent px-3 py-3 w-full text-white text-sm outline-none">
                    </div>
                    <button onclick="createNewPage()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-xl transition text-sm">Seite erstellen</button>
                    <p id="errorLog" class="text-xs text-red-400 hidden"></p>
                </div>
            </div>
        </section>

        <section id="view-editor" class="view-section hidden max-w-7xl mx-auto w-full px-6 py-10 grid grid-cols-1 lg:grid-cols-12 gap-10 flex-1">
            
            <main class="lg:col-span-5 space-y-6">
                <section class="bg-gray-900/40 border border-gray-900 p-6 rounded-2xl">
                    <h2 class="text-md font-semibold text-white mb-2">Profilbild anpassen</h2>
                    <input type="file" id="avatarUploader" accept="image/*" class="text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-gray-800 file:text-gray-200 hover:file:bg-gray-700 cursor-pointer">
                </section>

                <section class="bg-gray-900/40 border border-gray-900 p-6 rounded-2xl">
                    <h2 class="text-md font-semibold text-white mb-4">Link hinzufügen</h2>
                    <div class="space-y-3">
                        <input type="text" id="linkTitleInput" placeholder="Titel" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-blue-500">
                        <input type="url" id="linkUrlInput" placeholder="https://..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-blue-500">
                        
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Link-Icon (optional):</label>
                            <input type="file" id="linkImageUploader" accept="image/*" class="text-xs text-gray-400 file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:bg-gray-800 file:text-gray-200 cursor-pointer">
                        </div>

                        <button onclick="addNewLink()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl text-sm transition">Link einspeisen</button>
                    </div>
                </section>

                <section class="bg-gray-900/40 border border-gray-900 p-6 rounded-2xl">
                    <h2 class="text-md font-semibold text-white mb-2">Deine Bausteine</h2>
                    <div id="linksEditorContainer" class="space-y-2"></div>
                </section>
            </main>

            <aside class="lg:col-span-7 flex flex-col items-center">
                <div class="w-full max-w-sm bg-gray-900 border border-gray-800 rounded-[3rem] p-4 shadow-2xl relative aspect-[9/19] flex flex-col">
                    <div class="flex-1 overflow-y-auto p-6 flex flex-col items-center justify-between bg-gradient-to-b from-gray-900 via-gray-950 to-gray-950 rounded-[2.5rem]">
                        
                        <div class="w-full flex flex-col items-center text-center mt-6">
                            <div class="relative mb-4">
                                <div class="w-20 h-20 rounded-full bg-gray-800 border-2 border-gray-700 overflow-hidden flex items-center justify-center text-xl font-bold text-white uppercase" id="avatarContainer">
                                    <span id="avatarLetter">?</span>
                                </div>
                                <div id="blueBadge" class="hidden absolute bottom-0 right-0 w-6 h-6 rounded-full verified-badge border-2 border-gray-950 flex items-center justify-center p-1">
                                    <svg class="text-white w-full h-full" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                                </div>
                            </div>
                            <h1 class="text-lg font-bold text-white">@<span id="profileName">name</span></h1>
                        </div>

                        <div id="linksPreviewContainer" class="w-full space-y-3 my-auto py-6"></div>
                        <div class="text-center"><span class="text-[10px] text-gray-600 tracking-wider font-semibold uppercase">truepa.ge System</span></div>
                    </div>
                </div>
            </aside>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB91kgTv8QyGkCMibaftH3mtLS4NmGbLTI",
            authDomain: "truepage-ah.firebaseapp.com",
            projectId: "truepage-ah",
            storageBucket: "truepage-ah.firebasestorage.app",
            messagingSenderId: "679330743144",
            appId: "1:679330743144:web:f872ed11f8f935d1f60cdd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null, activeSlug = null, localLinks = [];
        let draggedItemIndex = null;

        window.showView = function(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
        };

        window.loginWithGoogle = function() { signInWithPopup(auth, provider).catch(err => console.error(err)); };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if (userSnap.exists() && userSnap.data().activeSlug) {
                    activeSlug = userSnap.data().activeSlug;
                    showView('view-editor');
                    loadPageData();
                } else { showView('view-register-slug'); }
            } else { showView('view-landing'); }
        });

        window.createNewPage = async function() {
            const slug = document.getElementById('pageUrlInput').value.trim().toLowerCase();
            if(!slug) return;
            const pageRef = doc(db, "pages", slug);
            await setDoc(pageRef, { ownerUid: currentUser.uid, slug, verified: false, vouchers: [], links: [], avatarData: "" });
            await setDoc(doc(db, "users", currentUser.uid), { activeSlug: slug });
            activeSlug = slug;
            showView('view-editor');
            loadPageData();
        };

        async function loadPageData() {
            if(!activeSlug) return;
            const snap = await getDoc(doc(db, "pages", activeSlug));
            if(!snap.exists()) return;
            const data = snap.data();

            localLinks = data.links || [];
            document.getElementById('profileName').innerText = data.slug;
            
            if (data.avatarData) {
                document.getElementById('avatarContainer').innerHTML = `<img src="${data.avatarData}" class="w-full h-full object-cover">`;
            } else {
                document.getElementById('avatarContainer').innerHTML = `<span id="avatarLetter">${data.slug.charAt(0)}</span>`;
            }

            renderLinks();
        }

        // Profilbild hochladen via data: (Base64)
        document.getElementById('avatarUploader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(event) {
                const base64String = event.target.result;
                document.getElementById('avatarContainer').innerHTML = `<img src="${base64String}" class="w-full h-full object-cover">`;
                await updateDoc(doc(db, "pages", activeSlug), { avatarData: base64String });
            };
            reader.readAsDataURL(file);
        });

        window.addNewLink = function() {
            const title = document.getElementById('linkTitleInput').value.trim();
            const url = document.getElementById('linkUrlInput').value.trim();
            const imgFile = document.getElementById('linkImageUploader').files[0];
            if(!title || !url) return;

            // Generiert eine saubere 6-stellige numerische ID für den echten /s/ Shortlink
            const shortId = Math.floor(100000 + Math.random() * 900000).toString();

            if (imgFile) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    saveLinkToFirebase({ shortId, title, url, iconData: e.target.result });
                };
                reader.readAsDataURL(imgFile);
            } else {
                saveLinkToFirebase({ shortId, title, url, iconData: "" });
            }
        };

        async function saveLinkToFirebase(linkObj) {
            localLinks.push(linkObj);
            
            // Shortlink-Mapping global speichern, damit die /s/ Seite ihn ohne Parameter auflösen kann
            await setDoc(doc(db, "shortlinks", linkObj.shortId), { targetUrl: linkObj.url });
            
            await updateDoc(doc(db, "pages", activeSlug), { links: localLinks });
            document.getElementById('linkTitleInput').value = '';
            document.getElementById('linkUrlInput').value = '';
            document.getElementById('linkImageUploader').value = '';
            renderLinks();
        }

        function renderLinks() {
            const editorList = document.getElementById('linksEditorContainer');
            const previewList = document.getElementById('linksPreviewContainer');
            editorList.innerHTML = ''; previewList.innerHTML = '';

            localLinks.forEach((link, index) => {
                const el = document.createElement('div');
                el.className = "bg-gray-950 border border-gray-800 p-3 rounded-xl flex justify-between items-center cursor-grab";
                el.draggable = true;
                el.innerHTML = `<div class="flex items-center space-x-3">
                                    ${link.iconData ? `<img src="${link.iconData}" class="w-6 h-6 rounded object-cover">` : '<span class="text-gray-600">☰</span>'}
                                    <span class="text-sm text-white">${link.title}</span>
                                 </div><button class="text-xs text-red-500">X</button>`;
                
                el.addEventListener('dragstart', () => { draggedItemIndex = index; });
                el.addEventListener('dragover', (e) => { e.preventDefault(); });
                el.addEventListener('drop', async () => {
                    const movedItem = localLinks.splice(draggedItemIndex, 1)[0];
                    localLinks.splice(index, 0, movedItem);
                    await updateDoc(doc(db, "pages", activeSlug), { links: localLinks });
                    renderLinks();
                });
                el.querySelector('button').addEventListener('click', async () => {
                    localLinks.splice(index, 1);
                    await updateDoc(doc(db, "pages", activeSlug), { links: localLinks });
                    renderLinks();
                });
                editorList.appendChild(el);

                // Preview-Link nutzt die saubere /s/SHORTID Struktur
                const previewEl = document.createElement('a');
                previewEl.href = `/s/${link.shortId}`;
                previewEl.target = "_blank";
                previewEl.className = "flex items-center bg-gray-800/40 hover:bg-gray-800 border border-gray-800 py-3 px-4 rounded-xl text-sm font-medium text-white transition w-full text-center justify-center relative";
                
                if(link.iconData) {
                    previewEl.innerHTML = `<img src="${link.iconData}" class="w-5 h-5 rounded object-cover absolute left-4">${link.title}`;
                } else {
                    previewEl.innerText = link.title;
                }
                previewList.appendChild(previewEl);
            });
        }
    </script>
</body>
</html>
