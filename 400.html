<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/icons/favicon.png">
    <title>400 | BAD REQUEST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { background: #050505; color: #e0e0e0; font-family: 'Rajdhani', sans-serif; }
        .mono { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-8">
    <div class="max-w-3xl mx-auto flex-grow flex flex-col justify-center">
        <div class="border border-gray-500/30 bg-gray-500/5 p-6 rounded-lg mb-8">
            <h1 class="text-6xl font-bold text-gray-400 mono mb-4 tracking-tighter text-shadow-md">ERROR 400</h1>
            <p class="text-2xl uppercase tracking-widest text-white mb-2">Bad Request</p>
            <div class="text-gray-400 mono text-sm space-y-1 border-l-2 border-gray-500/30 pl-4 py-2">
                <p>> [INPUT]: Malformed syntax detected.</p>
                <p>> [ORIGIN]: <span id="request-url" class="text-gray-200 break-all underline italic">loading...</span></p>
                <p>> [STATUS]: The server cannot process your request.</p>
            </div>
        </div>
        <a href="/" class="text-cyan-400 mono text-lg hover:underline"><- Clear Buffer & Reset</a>
    </div>

    <footer class="mt-auto pt-8 border-t border-white/10 text-xs flex gap-4 text-gray-600 mono">
        <a href="/impressum" class="hover:text-cyan-400 uppercase">Impressum</a>
        <a href="/privacy" class="hover:text-cyan-400 uppercase">Privacy</a>
    </footer>

    <script>document.getElementById('request-url').textContent = window.location.href;</script>
    <script src="/emoji/alex-emoji.js" defer></script>
    <script src="/emoji/brand-emojis.js" defer></script>
</body>
</html>
