<!DOCTYPE html>
<html lang="de-DE">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alexgamingdev – Umgezogen / Moved</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-blue: #00f2ff;
            --accent-purple: #bc13fe;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background-color: #050505; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        h1 { font-family: 'Orbitron', sans-serif; }
        .mono { font-family: 'Fira Code', monospace; }

        .space-bg { position: fixed; inset: 0; background: radial-gradient(circle at center, #0a0a0a, #050505); z-index: -1; }
        .star-layer { position: absolute; inset: 0; pointer-events: none; }
        @keyframes move-stars { from { transform: translateY(0); } to { transform: translateY(-1000px); } }

        nav { position: fixed; top: 0; width: 100%; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .nav-logo { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 0.15em; font-size: 1.1rem; color: #fff; display: flex; align-items: center; gap: 0.5rem; }
        .grad { background: linear-gradient(90deg, #00f2ff, #bc13fe, #00f2ff); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; animation: grad-shift 3s linear infinite; }
        @keyframes grad-shift { to { background-position: 200% center; } }
        select#lang { background: #000; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 4px 8px; font-size: 11px; color: var(--accent-blue); cursor: pointer; font-family: 'Fira Code', monospace; font-weight: 700; outline: none; text-transform: uppercase; }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 7rem 2rem 3rem; text-align: center; width: 100%; max-width: 860px; gap: 2.5rem; }

        .hero-logo { filter: drop-shadow(0 0 20px var(--accent-blue)); animation: float 6s ease-in-out infinite; width: 80px; height: 80px; object-fit: contain; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        h1 { font-size: clamp(2rem, 8vw, 4.5rem); font-weight: 900; letter-spacing: -0.02em; line-height: 1; }

        .notice { background: rgba(0,242,255,0.04); border: 1px solid rgba(0,242,255,0.25); padding: 2rem 2.5rem; width: 100%; max-width: 680px; clip-path: polygon(0 0, 100% 0, 100% 90%, 97% 100%, 0 100%); }
        .notice-label { font-family: 'Fira Code', monospace; font-size: 0.65rem; letter-spacing: 0.4em; color: var(--accent-blue); text-transform: uppercase; margin-bottom: 0.75rem; }
        .notice p { font-size: 1.1rem; color: rgba(255,255,255,0.75); line-height: 1.7; }

        .btn-row { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
        .btn { padding: 0.85rem 2.2rem; font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; background: transparent; transition: background 0.3s; }
        .btn-blue { border: 1px solid rgba(0,242,255,0.5); color: var(--accent-blue); }
        .btn-blue:hover { background: rgba(0,242,255,0.1); }
        .btn-purple { border: 1px solid rgba(188,19,254,0.4); color: rgba(188,19,254,0.85); }
        .btn-purple:hover { background: rgba(188,19,254,0.08); }

        footer { padding: 1.5rem; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.3; border-top: 1px solid rgba(255,255,255,0.05); width: 100%; text-align: center; }
    </style>
</head>
<body>
    <div class="space-bg" id="space-bg"></div>

    <nav>
        <div class="nav-logo">
            <img src="https://www.alexgamingdev.tech/icons/favicon.png" width="28" height="28" style="object-fit:contain" alt="Logo">
            alexgaming<span class="grad">dev</span>
        </div>
        <select id="lang">
            <option value="de" selected>DE</option>
            <option value="en">EN</option>
        </select>
    </nav>

    <main>
        <img src="https://www.alexgamingdev.tech/icons/favicon.png" class="hero-logo" alt="alexgamingdev">
        <h1>alexgaming<span class="grad">dev</span></h1>

        <div class="notice">
            <div class="notice-label mono">// migration notice</div>
            <p id="notice-text"></p>
        </div>

        <div class="btn-row">
            <a href="https://www.alexgamingdev.tech" class="btn btn-blue" id="btn-new"></a>
            <a href="/old/" class="btn btn-purple" id="btn-old"></a>
        </div>
    </main>

    <footer>© 2026 | Alexander Dennhoven (alexgamingdev)</footer>

    <script>
        // Stars
        (function () {
            const bg = document.getElementById('space-bg');
            function stars(n, size, dur) {
                const el = document.createElement('div');
                el.className = 'star-layer';
                const s = Array.from({length: n}, () => `${Math.random()*2000|0}px ${Math.random()*2000|0}px #fff`).join(',');
                el.style.cssText = `box-shadow:${s};width:${size}px;height:${size}px;animation:move-stars ${dur}s linear infinite`;
                bg.appendChild(el);
            }
            stars(700, 1, 100);
            stars(200, 2, 150);
        }());

        // i18n
        const i18n = {
            de: {
                notice: 'Diese Seite ist umgezogen. Die neue Website ist jetzt unter <strong style="color:#00f2ff">www.alexgamingdev.tech</strong> erreichbar.',
                btnNew: 'Neue Seite besuchen',
                btnOld: 'Alte Seite anzeigen',
                lang: 'de-DE'
            },
            en: {
                notice: 'This site has moved. The new website is now available at <strong style="color:#00f2ff">www.alexgamingdev.tech</strong>.',
                btnNew: 'Visit new site',
                btnOld: 'View old site',
                lang: 'en-US'
            }
        };

        const sel = document.getElementById('lang');

        function apply(code) {
            const t = i18n[code] || i18n.de;
            document.getElementById('notice-text').innerHTML = t.notice;
            document.getElementById('btn-new').textContent = t.btnNew;
            document.getElementById('btn-old').textContent = t.btnOld;
            document.documentElement.lang = t.lang;
            localStorage.setItem('lang', code);
        }

        sel.addEventListener('change', e => apply(e.target.value));

        const saved = localStorage.getItem('lang');
        const init = (saved && i18n[saved]) ? saved : 'de';
        sel.value = init;
        apply(init);
    </script>
</body>
</html>
