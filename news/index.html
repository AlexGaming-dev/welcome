<!DOCTYPE html>
<html lang="de-DE" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <title>NEWS | alexgamingdev</title>
    <link rel="icon" href="https://alexgaming.is-a.dev/icons/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --primary-black: #050505; --accent-blue: #00f2ff; --accent-purple: #bc13fe; --text-main: #e0e0e0; }
        body { font-family: 'Rajdhani', sans-serif; background-color: var(--primary-black); color: var(--text-main); margin: 0; overflow-x: hidden; }
        .mono { font-family: 'Fira Code', monospace; }
        .space-container { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); z-index: -1; }
        .star-layer { position: absolute; inset: 0; background-repeat: repeat; pointer-events: none; opacity: 0.5; }
        
        .animated-dev { background: linear-gradient(90deg, #00f2ff, #bc13fe, #00f2ff); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; animation: gradient-shift 3s linear infinite; }
        @keyframes gradient-shift { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        
        .news-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%); transition: transform 0.3s ease; }
        .news-card:hover { transform: translateY(-5px); border-color: rgba(0, 242, 255, 0.2); }
        
        @keyframes move-stars { from { transform: translateY(0); } to { transform: translateY(-500px); } }
    </style>
</head>
<body class="antialiased">
    <div class="space-container" id="space-bg"></div>

    <nav class="fixed w-full z-50 px-8 py-4 flex justify-between items-center bg-black/60 backdrop-blur-xl border-b border-white/5">
        <div class="text-lg font-black tracking-widest text-white flex items-center cursor-pointer" onclick="window.location.href='/'">
            <img src="https://alexgaming.is-a.dev/icons/favicon.png" class="w-8 h-8 mr-2">
            <span>alexgaming<span class="animated-dev">dev</span></span>
        </div>
    </nav>

    <main class="pt-32 pb-24 px-6 max-w-3xl mx-auto">
        <h1 class="text-4xl font-black mb-12 text-center text-white">// NEWS_FEED</h1>
        <div id="news-feed" class="grid gap-6"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        
        const config = { apiKey: "AIzaSyBm1PN6GX87GLIzW7cggTmnLuB7jntJKRM", authDomain: "alexgaming-dev.firebaseapp.com", projectId: "alexgaming-dev", storageBucket: "alexgaming-dev.firebasestorage.app", messagingSenderId: "749802649463", appId: "1:749802649463:web:66392d97fad59e6d4a9372" };
        const db = getFirestore(initializeApp(config));

        const verifiedIcon = `
            <div style="padding-left: 4px;">
                <div style="display: flex; flex-direction: row; align-items: center; gap: 4px;">
                    <div style="width: 18px; height: 18px;">
                        <svg fill="none" width="18" viewBox="0 0 24 24" height="18">
                            <circle cx="12" cy="12" r="11.5" fill="#0F73FF"></circle>
                            <path fill="#fff" fill-rule="evenodd" clip-rule="evenodd" d="M17.659 8.175a1.361 1.361 0 0 1 0 1.925l-6.224 6.223a1.361 1.361 0 0 1-1.925 0L6.4 13.212a1.361 1.361 0 0 1 1.925-1.925l2.149 2.148 5.26-5.26a1.361 1.361 0 0 1 1.925 0Z"></path>
                        </svg>
                    </div>
                </div>
            </div>`;

        onSnapshot(query(collection(db, "news"), orderBy("timestamp", "desc")), (s) => {
            const feed = document.getElementById('news-feed');
            feed.innerHTML = '';
            s.forEach((d) => {
                const data = d.data();
                feed.innerHTML += `
                    <div class="news-card p-8">
                        <div class="flex items-center gap-4 mb-6">
                            <img src="${data.logo}" class="w-12 h-12 rounded-full border border-white/10">
                            <div>
                                <a href="https://bsky.app/profile/alexgaming.is-a.dev" class="flex items-center font-bold text-lg hover:text-cyan-400 transition-colors">
                                    ${data.displayName}${data.verified ? verifiedIcon : ''}
                                </a>
                                <div class="mono text-xs text-cyan-400">@${data.username}</div>
                            </div>
                        </div>
                        <h3 class="text-2xl font-bold mb-4">${data.title}</h3>
                        <p class="text-white/70 leading-relaxed">${data.content}</p>
                    </div>`;
            });
        });

        const spaceBg = document.getElementById('space-bg');
        function createStars(count, size, duration) {
            const layer = document.createElement('div'); layer.className = 'star-layer';
            let shadows = []; 
            for(let i=0; i<count; i++) shadows.push(`${Math.random()*2000}px ${Math.random()*2000}px #fff`);
            layer.style.boxShadow = shadows.join(','); layer.style.width = size + 'px'; layer.style.height = size + 'px';
            layer.style.animation = `move-stars ${duration}s linear infinite`; spaceBg.appendChild(layer);
        }
        createStars(400, 2, 80);
        createStars(200, 1, 120);
    </script>
</body>
</html>
