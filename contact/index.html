    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --primary-black: #050505;
            --accent-blue: #00f2ff;
            --accent-purple: #bc13fe;
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--primary-black);
            color: var(--text-main);
            overflow-x: hidden;
            margin: 0;
            width: 100%;
        }

        h1, h2, h3, .nav-logo { font-family: 'Orbitron', sans-serif; }
        .mono { font-family: 'Fira Code', monospace; }

        .space-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%);
            z-index: -1;
        }
        .star-layer { position: absolute; inset: 0; background-repeat: repeat; pointer-events: none; }

        #loader-wrapper {
            position: fixed; inset: 0; background: #090707;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
            transition: opacity 0.6s ease;
        }
        .loader-3 { position: relative; width: 80px; height: 80px; border-radius: 50%; perspective: 800px; }
        .loader-3 .inner { position: absolute; width: 100%; height: 100%; border-radius: 50%; border-bottom: 3px solid var(--accent-blue); }
        .loader-3 .one { animation: rotate-one 1s linear infinite; }
        .loader-3 .two { animation: rotate-two 1s linear infinite; border-bottom: none; border-right: 3px solid var(--accent-purple); }
        .loader-3 .three { animation: rotate-three 1s linear infinite; border-bottom: none; border-top: 3px solid #fff; }

        @keyframes rotate-one { 0% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0deg); } 100% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(360deg); } }
        @keyframes rotate-two { 0% { transform: rotateX(50deg) rotateY(10deg) rotateZ(0deg); } 100% { transform: rotateX(50deg) rotateY(10deg) rotateZ(360deg); } }
        @keyframes rotate-three { 0% { transform: rotateX(35deg) rotateY(55deg) rotateZ(0deg); } 100% { transform: rotateX(35deg) rotateY(55deg) rotateZ(360deg); } }

        .animated-dev {
            background: linear-gradient(90deg, #00f2ff, #bc13fe, #00f2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradient-shift 3s linear infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes move-stars { from { transform: translateY(0); } to { transform: translateY(-1000px); } }
        
        input, textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            border-color: var(--accent-blue);
            background: rgba(0, 242, 255, 0.05);
        }
    </style>

<body class="antialiased">

    <div class="space-container" id="space-bg"></div>

    <div id="loader-wrapper">
        <div class="loader-3 mb-8">
            <div class="inner one"></div>
            <div class="inner two"></div>
            <div class="inner three"></div>
        </div>
        <div class="mono text-xs text-blue-500 tracking-[0.5em] animate-pulse">LOADING...</div>
    </div>

    <nav class="fixed w-full z-50 px-4 md:px-8 py-4 flex justify-between items-center bg-black/60 backdrop-blur-xl border-b border-white/5">

            <img src="https://alexgaming.is-a.dev/icons/favicon.png" class="w-6 h-6 md:w-8 md:h-8 mr-2 object-contain" alt="Logo">
            <span>alexgaming<span class="animated-dev">dev</span></span>
        </div>
        <select id="lang-toggle" class="bg-black border border-white/10 rounded px-2 py-1 text-[10px] md:text-xs text-cyan-400 focus:outline-none cursor-pointer uppercase font-bold">
            <option value="en">EN</option>
            <option value="de">DE</option>
        </select>
    </nav>

    <main class="min-h-screen pt-32 pb-12 px-6 flex items-center justify-center">
        <section id="contact" class="w-full max-w-4xl mx-auto">
            <h2 id="contact-title" class="text-2xl md:text-3xl font-bold mb-12 tracking-[0.3em] uppercase border-l-4 border-purple-500 pl-6 text-white">Encrypted Communication</h2>
            
            <div class="contact-card p-6 md:p-12">
                <form id="ajax-form" action="https://formspree.io/f/xwvnrnkk" method="POST" class="flex flex-col gap-8 mono">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="flex flex-col gap-3">
                            <label id="lbl-email" class="text-cyan-400 text-xs uppercase tracking-widest opacity-70">Source Endpoint (Email)</label>
                            <input type="email" name="email" required placeholder="name@domain.com" class="p-4">
                        </div>
                        <div class="flex flex-col gap-3">
                            <label id="lbl-subject" class="text-purple-400 text-xs uppercase tracking-widest opacity-70">Transmission Protocol (Subject)</label>
                            <input type="text" name="subject" required placeholder="Subject" class="p-4">
                        </div>
                    </div>
                    <div class="flex flex-col gap-3">
                        <label id="lbl-message" class="text-white/40 text-xs uppercase tracking-widest">Payload Data (Message)</label>
                        <textarea name="message" required rows="8" placeholder="Enter message..." class="p-4 resize-none"></textarea>
                    </div>
                    <div class="flex flex-col md:flex-row items-center gap-6">
                        <button type="submit" id="btn-submit" class="w-full md:w-max px-12 py-4 border border-cyan-500/50 hover:bg-cyan-500/20 text-cyan-400 font-bold uppercase tracking-widest transition-all cursor-pointer">Execute Uplink</button>
                        <div id="form-status" class="text-xs tracking-widest uppercase hidden font-bold"></div>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="py-12 md:py-20 text-center border-t border-white/5 opacity-40 text-[10px] md:text-xs tracking-[0.2em] uppercase">
        <div class="flex justify-center gap-6 mb-4">
            <a href="/impressum/" class="hover:text-white transition-colors">Impressum</a>
            <a href="/privacy/" class="hover:text-white transition-colors">Privacy</a>
        </div>
        © 2026 | alexgamingdev
    </footer>

    <script>
        const langData = {
            en: { 
                con: "Encrypted Communication",
                lblE: "Source Endpoint (Email)", lblS: "Transmission Protocol", lblM: "Payload Data", btnS: "Execute Uplink",
                statusS: "Transmission successful.", statusE: "Error: Uplink failed."
            },
            de: { 
                con: "Verschlüsselte Kommunikation",
                lblE: "Absender-Endpunkt (Email)", lblS: "Übertragungs-Protokoll", lblM: "Nachrichtendaten", btnS: "Uplink Ausführen",
                statusS: "Übertragung erfolgreich.", statusE: "Fehler: Uplink fehlgeschlagen."
            }
        };

        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader-wrapper');
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 600);
            }, 1000);
        });

        const spaceBg = document.getElementById('space-bg');
        function createStars(count, size, duration) {
            const layer = document.createElement('div');
            layer.className = 'star-layer';
            let shadows = [];
            const w = window.innerWidth * 2;
            const h = window.innerHeight * 2;
            for(let i=0; i<count; i++) shadows.push(`${Math.random()*w}px ${Math.random()*h}px #fff`);
            layer.style.boxShadow = shadows.join(',');
            layer.style.width = size + 'px'; layer.style.height = size + 'px';
            layer.style.animation = `move-stars ${duration}s linear infinite`;
            spaceBg.appendChild(layer);
        }
        function initStars() { spaceBg.innerHTML = ''; createStars(700, 1, 100); createStars(200, 2, 150); }
        initStars();
        let starsResizeTimer; window.addEventListener('resize', () => { clearTimeout(starsResizeTimer); starsResizeTimer = setTimeout(initStars, 200); });

        document.getElementById('lang-toggle').addEventListener('change', (e) => {
            const l = e.target.value;
            if(langData[l]) {
                document.getElementById('contact-title').innerText = langData[l].con;
                document.getElementById('lbl-email').innerText = langData[l].lblE;
                document.getElementById('lbl-subject').innerText = langData[l].lblS;
                document.getElementById('lbl-message').innerText = langData[l].lblM;
                document.getElementById('btn-submit').innerText = langData[l].btnS;
            }
        });

        const contactForm = document.getElementById('ajax-form');
        const statusMsg = document.getElementById('form-status');
        contactForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            statusMsg.classList.remove('hidden');
            statusMsg.innerText = "CONNECTING...";
            statusMsg.className = "text-yellow-500 animate-pulse font-bold tracking-widest";
            const data = new FormData(contactForm);
            const response = await fetch(contactForm.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } });
            const lang = document.getElementById('lang-toggle').value;
            if (response.ok) {
                statusMsg.innerText = langData[lang].statusS;
                statusMsg.className = "text-green-500 font-bold tracking-widest";
                contactForm.reset();
            } else {
                statusMsg.innerText = langData[lang].statusE;
                statusMsg.className = "text-red-500 font-bold";
            }
        });
    </script>
